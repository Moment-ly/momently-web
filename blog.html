<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | MOMENTly</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS JE NAPROSTO TOTOŽNÉ S INDEX.HTML */
        :root { --teracotta: #A6735B; --bg-color: #F4EFEA; --text-dark: #2C2C2C; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); font-family: 'Cormorant Garamond', serif; color: var(--text-dark); overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 50px 5%; position: absolute; width: 100%; box-sizing: border-box; z-index: 1000; }
        .logo img { height: 100px; width: auto; }
        .nav-links { display: flex; gap: 30px; list-style: none; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 500; }
        .nav-links a.active { color: var(--teracotta); border-bottom: 2px solid var(--teracotta); }

        .hero { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0 5%; box-sizing: border-box; text-align: center; }
        .brush-bg { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 110%; height: 100%; background-image: url('stetec.png'); background-repeat: no-repeat; background-position: center; background-size: contain; opacity: 0.8; z-index: 1; pointer-events: none; }
        
        .content { position: relative; z-index: 10; width: 100%; max-width: 1200px; }
        h1 { font-size: clamp(3.5rem, 9vw, 5.5rem); line-height: 1; margin: 0 0 15px 0; font-weight: 600; letter-spacing: -2px; }
        .subtitle { font-size: clamp(1.1rem, 2.2vw, 1.4rem); line-height: 1.5; color: #444; font-family: 'Inter', sans-serif; max-width: 750px; margin: 0 auto; }

        /* BLOG GRID - zachován pod hero sekcí */
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1200px; margin: -50px auto 100px; padding: 0 5%; position: relative; z-index: 20; }
        .blog-card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo"><img src="moment-logo.png" alt="MOMENTly logo"></a>
        <ul class="nav-links">
            <li><a href="index.html">Jak to funguje</a></li>
            <li><a href="fotografove.html">Pro fotografy</a></li>
            <li><a href="blog.html" class="active">Blog</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>
    <div class="hero">
        <div class="brush-bg"></div>
        <div class="content">
            <h1>Inspirace a styl.</h1>
            <p class="subtitle">Ponořte se do světa vizuálního rukopisu a zjistěte, jak AI mění svět fotografie.</p>
        </div>
    </div>
    <div class="blog-grid">
        <div class="blog-card"><h3>Jak AI pozná váš styl?</h3><p>Technologie za MOMENTly.</p></div>
        <div class="blog-card"><h3>Světlo jako podpis.</h3><p>Proč je práce se stíny klíčová.</p></div>
    </div>
</body>
</html>
