<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | MOMENTly</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --teracotta: #A6735B; --bg-color: #F4EFEA; --text-dark: #2C2C2C; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); font-family: 'Cormorant Garamond', serif; color: var(--text-dark); overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 50px 5%; position: absolute; width: 100%; box-sizing: border-box; z-index: 1000; }
        .logo img { height: 100px; width: auto; }
        .nav-links { display: flex; gap: 30px; list-style: none; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 500; }
        .nav-links a.active { color: var(--teracotta); border-bottom: 2px solid var(--teracotta); }

        /* HERO SEKCE - PŘESNĚ JAKO NA INDEXU */
        .hero { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 180px 5% 60px 5%; box-sizing: border-box; text-align: center; }
        
        /* TADY JE TEN KLÍČOVÝ NÁPIS ŠTĚTCEM - HODNOTY Z INDEXU */
        .brush-bg { 
            position: absolute; 
            top: 55%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 110%; 
            height: 100%; 
            background-image: url('stetec.png'); 
            background-repeat: no-repeat; 
            background-position: center; 
            background-size: contain; 
            opacity: 0.8; 
            z-index: 1; 
            pointer-events: none; 
        }

        .content { position: relative; z-index: 10; max-width: 800px; width: 100%; }
        h1 { font-size: clamp(2.8rem, 8vw, 4.8rem); line-height: 1.05; margin: 0 0 20px 0; font-weight: 600; letter-spacing: -1px; }
        .subtitle { font-size: clamp(1.1rem, 2.5vw, 1.3rem); line-height: 1.6; color: #444; font-family: 'Inter', sans-serif; margin-bottom: 30px; }
        .contact-email { color: var(--teracotta); text-decoration: none; font-weight: 600; font-size: 1.5rem; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo"><img src="moment-logo.png" alt="MOMENTly logo"></a>
        <ul class="nav-links">
            <li><a href="index.html">Jak to funguje</a></li>
            <li><a href="fotografove.html">Pro fotografy</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="kontakt.html" class="active">Kontakt</a></li>
        </ul>
    </nav>

    <div class="hero">
        <div class="brush-bg"></div>
        <div class="content">
            <h1>Napište nám.</h1>
            <p class="subtitle">Budeme rádi za každou zprávu, dotaz nebo návrh na spolupráci.</p>
            <a href="mailto:hello@momently.cz" class="contact-email">hello@momently.cz</a>
        </div>
    </div>
</body>
</html>
