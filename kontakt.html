        /* CSS JE NAPROSTO TOTOŽNÉ S INDEX.HTML */
        :root { --teracotta: #A6735B; --bg-color: #F4EFEA; --text-dark: #2C2C2C; }

        /* PARTICLES */
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        /* NAV SCROLLED */
        nav { transition: all 0.4s ease; }

        /* BLOB */
        .blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.18; pointer-events: none; animation: blobFloat2 8s ease-in-out infinite; }
        .blob-a { width: 400px; height: 400px; background: var(--teracotta); top: -100px; right: -80px; }
        .blob-b { width: 280px; height: 280px; background: #C4957A; bottom: -40px; left: -60px; animation-delay: -4s; }
        @keyframes blobFloat2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(15px,-20px); } }
        /* HERO CONTENT ANIM */
        .hero-anim { opacity: 0; animation: fadeUpIn 0.9s ease forwards; }
        .hero-anim:nth-child(1) { animation-delay: 0.3s; }
        .hero-anim:nth-child(2) { animation-delay: 0.5s; }
        .hero-anim:nth-child(3) { animation-delay: 0.7s; }
        @keyframes fadeUpIn { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        /* APP BTN shimmer */
        .app-btn { position: relative; overflow: hidden; transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .app-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transition: left 0.5s ease; }
        .app-btn:hover::before { left: 100%; }
        .app-btn:hover { transform: translateY(-4px); box-shadow: 0 25px 40px rgba(166,115,91,0.4) !important; }

        /* HAMBURGER MENU */
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 5px; z-index: 2000; }
        .hamburger span { display: block; width: 24px; height: 2px; background-color: var(--text-dark); border-radius: 2px; transition: all 0.3s ease; }

        /* GLOBAL BRUSH BACKGROUND */
        body::before {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 110vw; height: 100vh;
            background-image: url('stetec.png');

        .reveal.from-left { transform: translateX(-60px); }

        .reveal.from-bottom { transform: translateY(50px); }
        .reveal.scale-in { transform: scale(0.88); }
        .reveal.visible { opacity: 1 !important; transform: none !important; }
        .section-line { width: 0; height: 1px; background: var(--teracotta); opacity: 0.4; margin: 15px 0 50px; transition: width 1.2s cubic-bezier(0.16,1,0.3,1); }

    <script>
    const _robs = new IntersectionObserver(entries => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal, .section-line').forEach(el => _robs.observe(el));
    addEventListener('scroll', () => {
        document.querySelector('nav').classList.toggle('scrolled', scrollY > 50);
    });
    </script>

    <script>
    (function() {
        var canvas = document.createElement('canvas');
        canvas.id = 'particles-cvs';
        canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;';
        document.body.prepend(canvas);
        var ctx = canvas.getContext('2d');
        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
        resize(); addEventListener('resize', resize);
        var pts = Array.from({length: 35}, function() { return {
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            r: Math.random()*1.8+0.3, dx: (Math.random()-.5)*.3, dy: (Math.random()-.5)*.3,
            a: Math.random()*.3+.06
        }; });
        (function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pts.forEach(function(p) {
                ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle='rgba(166,115,91,'+p.a+')'; ctx.fill();
                p.x+=p.dx; p.y+=p.dy;
                if(p.x<0||p.x>canvas.width)p.dx*=-1;
                if(p.y<0||p.y>canvas.height)p.dy*=-1;
            });
            requestAnimationFrame(draw);
        })();
    })();
    </script>

    <div class="cookie-banner" id="cookieBanner">
        <p>Používáme cookies pro analýzu návštěvnosti a zlepšení webu. <a href="kontakt.html">Více info</a></p>
        <div class="cookie-btns">

        </div>
    </div>
    <script>
    (function() {
        var banner = document.getElementById('cookieBanner');
        if (!banner) return;
        if (localStorage.getItem('cookieConsent')) { banner.classList.add('hidden'); return; }
        function dismiss(val) {
            localStorage.setItem('cookieConsent', val);
            banner.classList.add('hidden');
        }
        document.getElementById('cookieAccept').addEventListener('click', function() { dismiss('accepted'); });
        document.getElementById('cookieDecline').addEventListener('click', function() { dismiss('declined'); });
    })();
    </script>

    <script>
    (function() {
        var btn = document.getElementById('hamburger');
        var menu = document.getElementById('navLinks');
        if (!btn || !menu) return;
        btn.addEventListener('click', function() {
            var isOpen = menu.style.display === 'flex';
            if (isOpen) {
                menu.style.display = 'none';
                btn.innerHTML = '<span></span><span></span><span></span>';
                document.body.style.overflow = '';
            } else {
                menu.style.display = 'flex';
                btn.innerHTML = '&#10005;';
                document.body.style.overflow = 'hidden';
            }
        });
        menu.querySelectorAll('a').forEach(function(a) {
            a.addEventListener('click', function() {
                menu.style.display = 'none';
                btn.innerHTML = '<span></span><span></span><span></span>';
                document.body.style.overflow = '';
            });
        });
    })();
    </script>
